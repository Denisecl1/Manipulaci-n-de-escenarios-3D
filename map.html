<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>



<script type="module">

import * as THREE from 'three';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
import { MapControls } from 'three/addons/controls/MapControls.js';

let camera, controls, scene, renderer;

init();

function init(){

scene = new THREE.Scene();

scene.background = new THREE.Color(0xaec6ff);

scene.fog = new THREE.FogExp2(0x202030,0.0008);


// renderer

renderer = new THREE.WebGLRenderer({antialias:true});

renderer.setPixelRatio(window.devicePixelRatio);

renderer.setSize(window.innerWidth,window.innerHeight);

renderer.setAnimationLoop(animate);

document.body.appendChild(renderer.domElement);


// camera

camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
1,
2000
);

camera.position.set(400,300,400);

camera.lookAt(0,0,0);


// controls

controls = new MapControls(camera,renderer.domElement);

controls.enableDamping = true;

controls.dampingFactor = 0.05;

controls.screenSpacePanning = false;

controls.minDistance = 100;

controls.maxDistance = 1000;

controls.maxPolarAngle = Math.PI/2;


// suelo ciudad

const groundGeometry = new THREE.PlaneGeometry(2000,2000);

const groundMaterial = new THREE.MeshPhongMaterial({
color:0x2e2e2e
});

const ground = new THREE.Mesh(groundGeometry,groundMaterial);

ground.rotation.x = -Math.PI/2;

scene.add(ground);


// grid calles

const grid = new THREE.GridHelper(2000,80,0x444444,0x444444);

scene.add(grid);


// edificios

const geometry = new THREE.BoxGeometry();

geometry.translate(0,0.5,0);

const material = new THREE.MeshPhongMaterial({
color:0x3f4a6b,
flatShading:true
});

const mesh = new THREE.InstancedMesh(geometry,material,500);

const dummy = new THREE.Object3D();

for(let i=0;i<500;i++){

dummy.position.x = Math.random()*1600-800;

dummy.position.z = Math.random()*1600-800;

dummy.position.y = 0;

dummy.scale.x = 20;

dummy.scale.z = 20;

dummy.scale.y = Math.random()*120+20;

dummy.updateMatrix();

mesh.setMatrixAt(i,dummy.matrix);

}

scene.add(mesh);



/* ======================
        ARBOLES
====================== */

const trunkGeometry = new THREE.CylinderGeometry(1,1,8);
const trunkMaterial = new THREE.MeshPhongMaterial({color:0x8b5a2b});

const leavesGeometry = new THREE.SphereGeometry(4);
const leavesMaterial = new THREE.MeshPhongMaterial({color:0x2e8b57});

for(let i=0;i<60;i++){

const trunk = new THREE.Mesh(trunkGeometry,trunkMaterial);
const leaves = new THREE.Mesh(leavesGeometry,leavesMaterial);

const x = Math.random()*1600-800;
const z = Math.random()*1600-800;

trunk.position.set(x,4,z);
leaves.position.set(x,10,z);

scene.add(trunk);
scene.add(leaves);

}



/* ======================
        FAROLES
====================== */

const poleGeometry = new THREE.CylinderGeometry(0.8,0.8,20);
const poleMaterial = new THREE.MeshPhongMaterial({color:0x555555});

const lampGeometry = new THREE.SphereGeometry(2);
const lampMaterial = new THREE.MeshBasicMaterial({color:0xffffaa});

for(let i=0;i<30;i++){

const pole = new THREE.Mesh(poleGeometry,poleMaterial);
const lamp = new THREE.Mesh(lampGeometry,lampMaterial);

const x = Math.random()*1600-800;
const z = Math.random()*1600-800;

pole.position.set(x,10,z);
lamp.position.set(x,20,z);

scene.add(pole);
scene.add(lamp);

}
/* ======================
        CARROS
====================== */

/* ======================
        CARROS
====================== */

const cars = [];

const carGeometry = new THREE.BoxGeometry(8,4,4);

for(let i=0;i<15;i++){

const color = new THREE.Color(Math.random(),Math.random(),Math.random());

const carMaterial = new THREE.MeshPhongMaterial({color:color});

const car = new THREE.Mesh(carGeometry,carMaterial);

car.position.x = Math.random()*1600-800;
car.position.z = Math.random()*1600-800;
car.position.y = 2;

scene.add(car);

// dirección aleatoria
const direction = Math.random() > 0.5 ? "x" : "z";

cars.push({
mesh:car,
speed:Math.random()*1+0.3,
direction:direction
});

}


/*animacion */


function animate(){

controls.update();

cars.forEach(car=>{

if(car.direction === "x"){

car.mesh.position.x += car.speed;

if(car.mesh.position.x > 800){
car.mesh.position.x = -800;
}

}

if(car.direction === "z"){

car.mesh.position.z += car.speed;

if(car.mesh.position.z > 800){
car.mesh.position.z = -800;
}

}

});

renderer.render(scene,camera);

}



// luces

const dirLight1 = new THREE.DirectionalLight(0xffffff,4);
dirLight1.position.set(100,200,100);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x4455aa,1);
dirLight2.position.set(-100,200,-100);
scene.add(dirLight2);

const ambientLight = new THREE.AmbientLight(0x888888);
scene.add(ambientLight);


// GUI

const gui = new GUI();

gui.add(controls,'zoomToCursor');
gui.add(controls,'screenSpacePanning');


// resize

window.addEventListener("resize",onWindowResize);

}



function onWindowResize(){

camera.aspect = window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}


function animate(){

controls.update();

renderer.render(scene,camera);

}

</script>
